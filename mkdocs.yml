site_name: bibtui
site_description: A quiet, powerful home for your references — a keyboard-driven BibTeX manager for the terminal.
site_author: Thomas Gölles
site_url: https://tgoelles.github.io/bib_tui/

repo_name: tgoelles/bib_tui
repo_url: https://github.com/tgoelles/bib_tui
edit_uri: edit/main/docs/

copyright: Copyright &copy; Thomas Gölles — MIT licensed

theme:
  name: material
  logo: assets/img/logo2.png
  favicon: assets/img/logo2.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting started: getting-started.md
  - User guide:
      - Searching your library: guide/search.md
      - Keywords & tags: guide/keywords.md
      - Fetching PDFs: guide/pdfs.md
      - Importing references: guide/importing.md
      - Editing & citations: guide/editing.md
  - Working as a team: collaboration.md
  - Configuration: configuration.md
  - Keybindings: keybindings.md
  - Development: development.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - tables
  - footnotes
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tgoelles/bib_tui
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/bibtui/
